name: Compilar OrangeFox 12.1 Para Pettyl
run-name: elmendezz-fox12.1_${{ github.run_number }}

on:
  workflow_dispatch:
    inputs:
      fox_sync_url:
        description: 'OrangeFox: URL del repo de Sincronización'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      fox_manifest_branch:
        description: 'OrangeFox: Rama del Manifiesto'
        required: true
        default: '12.1'
      fox_device_tree_url:
        description: 'OrangeFox: URL del Device Tree'
        required: true
        default: 'https://github.com/elmendezz/android_device_motorola_pettyl'
      fox_device_branch:
        description: 'OrangeFox: Rama del Device Tree'
        required: false
        default: 'fox_12.1'
      makefile_name:
        description: 'Nombre del makefile para lunch'
        required: true
        default: 'twrp_pettyl-eng'

permissions:
  contents: write

jobs:
  OrangeFox-Recovery-Compile:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Limpiar espacio en disco
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: false

    - name: Descargar el repositorio principal
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0 

    - name: Calcular Tag y Build
      id: fox_version_calc
      run: |
        BUILD_NUM=$(sed -n '1p' versiones.txt | tr -d '\r' | tr -d ' ')
        if ! [[ "$BUILD_NUM" =~ ^[0-9]+$ ]]; then BUILD_NUM=0; fi
        NEW_BUILD_NUM=$((BUILD_NUM + 1))
        TAG="12.1-b$NEW_BUILD_NUM"
        
        echo "NEW_BUILD_NUM=$NEW_BUILD_NUM" >> $GITHUB_ENV
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo "Tag para GitHub Release: $TAG"

    - name: Configurar Java 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Instalar Dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev x11proto-core-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip git ccache python3 python-is-python3 libssl-dev rsync

    - name: Configurar Repo Tool
      run: |
        curl -sL https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
        chmod a+x ~/repo
        sudo mv ~/repo /usr/local/bin/repo

    - name: Sincronizar Fuentes de OrangeFox 12.1
      run: |
        mkdir -p /home/runner/OrangeFox_sync
        cd /home/runner/OrangeFox_sync
        git clone ${{ github.event.inputs.fox_sync_url }}
        
        cd sync
        chmod +x orangefox_sync.sh
        ./orangefox_sync.sh --branch ${{ github.event.inputs.fox_manifest_branch }} --path /home/runner/fox_12.1
        
    - name: Clonar Árbol del Dispositivo
      working-directory: /home/runner/fox_12.1
      run: |
        if [ -n "${{ github.event.inputs.fox_device_branch }}" ]; then
          git clone -b ${{ github.event.inputs.fox_device_branch }} ${{ github.event.inputs.fox_device_tree_url }} device/motorola/pettyl
        else
          git clone ${{ github.event.inputs.fox_device_tree_url }} device/motorola/pettyl
        fi
        
        # Parche automático por si quedó rastro de omni en el mk principal
        sed -i 's/vendor\/omni\/config\/common.mk/vendor\/twrp\/config\/common.mk/g' device/motorola/pettyl/twrp_pettyl.mk || true

    - name: Compilar Recovery OrangeFox
      working-directory: /home/runner/fox_12.1
      run: |
        set -x
        
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        
        # --- EXTRACCIÓN AUTOMÁTICA DE VARIABLES DE OrangeFox.mk ---
        # Define la ruta de tu archivo mk
        ORANGEFOX_MK="device/motorola/pettyl/OrangeFox.mk"
        
        if [ -f "$ORANGEFOX_MK" ]; then
          echo "🔍 Extrayendo variables de $ORANGEFOX_MK..."
          
          # 1. Ignoramos líneas comentadas enteras (^#)
          # 2. Buscamos líneas que tengan un signo igual (= o :=)
          # 3. Usamos awk para limpiar espacios, remover comentarios en línea y formatear como 'export KEY="VALUE"'
          grep -v '^\s*#' "$ORANGEFOX_MK" | grep '=' | awk -F ':?=' '{
            sub(/#.*/, "", $2); # Elimina comentarios al final de la línea si los hay
            gsub(/^[ \t]+|[ \t]+$/, "", $1); # Limpia espacios de la variable
            gsub(/^[ \t]+|[ \t]+$/, "", $2); # Limpia espacios del valor
            print "export " $1 "=\"" $2 "\""
          }' > export_fox_vars.sh
          
          echo "--- 📋 Variables detectadas y exportadas ---"
          cat export_fox_vars.sh
          
          # Ejecutamos el script generado para aplicar los export al entorno actual
          source export_fox_vars.sh
          echo "--------------------------------------------"
        else
          echo "⚠️ Advertencia: No se encontró el archivo $ORANGEFOX_MK. Continuando sin variables extraídas."
        fi
        # ----------------------------------------------------------
        
        # 1. Apagamos el fail-on-error estricto de GitHub
        set +e
        source build/envsetup.sh
        
        # 2. Lo volvemos a encender por seguridad
        set -e
        
        # 3. Configurar el dispositivo
        lunch ${{ github.event.inputs.makefile_name }}
        
        # 4. Compilar (Se removió FOX_VERSION para usar las variables del device tree)
        make clean
        mka recoveryimage OF_MAINTAINER="elmendezz" -j$(nproc --all)

    - name: Subir como Artifact de GitHub
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-Pettyl-Build-${{ env.NEW_BUILD_NUM }}
        path: |
          /home/runner/fox_12.1/out/target/product/pettyl/OrangeFox-*-pettyl.img
          /home/runner/fox_12.1/out/target/product/pettyl/OrangeFox-*-pettyl.zip

    - name: Publicar Pre-Release Bilingüe
      uses: softprops/action-gh-release@v2
      with:
        tag_name: OrangeFox-${{ env.TAG }}
        name: OrangeFox (Build ${{ env.NEW_BUILD_NUM }}) - Pettyl
        prerelease: true
        files: |
          /home/runner/fox_12.1/out/target/product/pettyl/OrangeFox-*-pettyl.img
          /home/runner/fox_12.1/out/target/product/pettyl/OrangeFox-*-pettyl.zip
        body: |
          ## 📍 Pre-Release: OrangeFox 12.1 Pettyl
          **Build:** #${{ env.NEW_BUILD_NUM }}
          **Estado / Status:** 🚧 Testing / Pre-release
          
          ### 📝 Notas de la versión / Release Notes:
          - **ES:** Compilado con las fuentes de OrangeFox 12.1 para Pettyl. Variables de versión nativas extraídas y aplicadas automáticamente desde el device tree.
          - **EN:** Compiled with OrangeFox 12.1 sources for Pettyl. Native version variables automatically extracted and applied from device tree.
          
          ### 🚀 Instalación rápida / Quick Install:
          1. **ES:** Pon el móvil en modo **Fastboot** (Vol- + Power). / **EN:** Boot device into **Fastboot** mode (Vol- + Power).
          2. **PRUEBA / TEST:** `fastboot boot OrangeFox-<version>-pettyl.img`
          3. **INSTALA / INSTALL:** `fastboot flash recovery OrangeFox-<version>-pettyl.img`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Actualizar y pushear versiones.txt
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        SUCCESS=false
        for i in {1..5}; do
          git fetch origin
          git reset --hard origin/${GITHUB_REF##*/}
          sed -i "1s/.*/${{ env.NEW_BUILD_NUM }}/" versiones.txt
          git add versiones.txt
          git commit -m "OrangeFox 12.1: Update build number to ${{ env.NEW_BUILD_NUM }}" || true
          
          if git push origin HEAD; then
            SUCCESS=true
            break
          else
            sleep 3
          fi
        done
        
        if [ "$SUCCESS" != "true" ]; then 
          echo "No se pudo actualizar versiones.txt"
          exit 1
        fi
